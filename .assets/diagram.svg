<svg width="700" height="540" xmlns="http://www.w3.org/2000/svg"
     font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Applications ─────────────────────────────────────────────────── -->
  <rect x="20" y="18" width="660" height="58" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="37" text-anchor="middle" font-weight="600" font-size="13" fill="#1d4ed8">Applications</text>
  <text x="350" y="56" text-anchor="middle" fill="#4b5563">Blender · GIMP · text editor · mpv · file manager</text>

  <!-- branch: apps → real tree + virtual views -->
  <line x1="350" y1="77" x2="350" y2="88" stroke="#64748b" stroke-width="1.5"/>
  <line x1="179" y1="88" x2="521" y2="88" stroke="#64748b" stroke-width="1.5"/>
  <line x1="179" y1="88" x2="179" y2="96" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="521" y1="88" x2="521" y2="96" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Real tree ─────────────────────────────────────────────────────── -->
  <rect x="20" y="99" width="318" height="196" rx="6"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="179" y="118" text-anchor="middle" font-weight="600" font-size="13" fill="#14532d">Real tree</text>

  <!-- col 1 -->
  <text x="35"  y="136" font-size="13">📁</text>
  <text x="52"  y="136" font-family="monospace" font-size="10" fill="#374151">character/</text>
  <text x="52"  y="148" font-family="monospace" font-size="9"  fill="#6b7280">*.paa *.pac *.pam *.prefab</text>

  <text x="35"  y="163" font-size="13">📁</text>
  <text x="52"  y="163" font-family="monospace" font-size="10" fill="#374151">gamedata/</text>
  <text x="52"  y="175" font-family="monospace" font-size="9"  fill="#6b7280">*.paloc *.pabgb *.pami</text>

  <text x="35"  y="190" font-size="13">📁</text>
  <text x="52"  y="190" font-family="monospace" font-size="10" fill="#374151">sound/</text>
  <text x="52"  y="202" font-family="monospace" font-size="9"  fill="#6b7280">*.wem *.bnk</text>

  <!-- col 2 -->
  <text x="175" y="136" font-size="13">📁</text>
  <text x="192" y="136" font-family="monospace" font-size="10" fill="#374151">object/</text>
  <text x="192" y="148" font-family="monospace" font-size="9"  fill="#6b7280">*.pam *.dds *.prefab</text>

  <text x="175" y="163" font-size="13">📁</text>
  <text x="192" y="163" font-family="monospace" font-size="10" fill="#374151">ui/</text>
  <text x="192" y="175" font-family="monospace" font-size="9"  fill="#6b7280">*.dds</text>

  <text x="175" y="190" font-size="13">📁</text>
  <text x="192" y="190" font-family="monospace" font-size="10" fill="#374151">texture/</text>
  <text x="192" y="202" font-family="monospace" font-size="9"  fill="#6b7280">*.dds</text>

  <text x="179" y="282" text-anchor="middle" font-size="11" fill="#6b7280">read · write · auto-repack on close</text>

  <!-- ── Virtual views ─────────────────────────────────────────────────── -->
  <rect x="362" y="99" width="318" height="196" rx="6"
        fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="521" y="118" text-anchor="middle" font-weight="600" font-size="13" fill="#581c87">Virtual views</text>

  <text x="377" y="136" font-size="13">📁</text>
  <text x="394" y="136" font-family="monospace" font-size="10" fill="#374151">.paloc.jsonl/</text>
  <text x="394" y="148" font-family="monospace" font-size="9"  fill="#6b7280">└ localizationstring_eng.paloc.jsonl</text>

  <text x="377" y="163" font-size="13">📁</text>
  <text x="394" y="163" font-family="monospace" font-size="10" fill="#374151">.dds.png/</text>
  <text x="394" y="175" font-family="monospace" font-size="9"  fill="#6b7280">└ bitmap_bell.dds.png</text>

  <text x="377" y="190" font-size="13">📁</text>
  <text x="394" y="190" font-family="monospace" font-size="10" fill="#374151">.wem.ogg/</text>
  <text x="394" y="202" font-family="monospace" font-size="9"  fill="#6b7280">└ nhm_adult_noble_1_*.wem.ogg</text>

  <text x="377" y="217" font-size="13">📁</text>
  <text x="394" y="217" font-family="monospace" font-size="10" fill="#374151">.pam.fbx/  .pac.fbx/  .pamlod.fbx/</text>

  <!-- arrow: virtual views → conversions -->
  <line x1="521" y1="296" x2="521" y2="306" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Conversions ───────────────────────────────────────────────────── -->
  <rect x="362" y="308" width="318" height="74" rx="6"
        fill="#fdf4ff" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="521" y="323" text-anchor="middle" font-size="10" fill="#7e22ce">on-demand conversions  (virtual_files.rs)</text>

  <rect x="370" y="329" width="68" height="46" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="404" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#581c87">PALOC</text>
  <text x="404" y="357" text-anchor="middle" font-size="10" fill="#374151">↔ JSONL</text>
  <text x="404" y="370" text-anchor="middle" font-size="9"  fill="#9333ea">rw</text>

  <rect x="446" y="329" width="68" height="46" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="480" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#581c87">DDS</text>
  <text x="480" y="357" text-anchor="middle" font-size="10" fill="#374151">↔ PNG</text>
  <text x="480" y="370" text-anchor="middle" font-size="9"  fill="#9333ea">rw</text>

  <rect x="522" y="329" width="68" height="46" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="556" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#581c87">PAM · PAC</text>
  <text x="556" y="357" text-anchor="middle" font-size="10" fill="#374151">→ FBX</text>
  <text x="556" y="370" text-anchor="middle" font-size="9"  fill="#6b7280">ro</text>

  <rect x="598" y="329" width="68" height="46" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="632" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#581c87">WEM</text>
  <text x="632" y="357" text-anchor="middle" font-size="10" fill="#374151">↔ OGG</text>
  <text x="632" y="370" text-anchor="middle" font-size="9"  fill="#9333ea">rw</text>

  <!-- join: real tree + conversions → cdfuse -->
  <line x1="179" y1="296" x2="179" y2="396" stroke="#64748b" stroke-width="1.5"/>
  <line x1="521" y1="383" x2="521" y2="396" stroke="#64748b" stroke-width="1.5"/>
  <line x1="179" y1="396" x2="521" y2="396" stroke="#64748b" stroke-width="1.5"/>
  <line x1="350" y1="396" x2="350" y2="404" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── cdfuse / cdwinfs ──────────────────────────────────────────────── -->
  <rect x="20" y="407" width="660" height="64" rx="6"
        fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="350" y="428" text-anchor="middle" font-weight="600" font-size="13" fill="#312e81">cdfuse (Linux · FUSE)  /  cdwinfs (Windows · WinFSP)</text>
  <text x="350" y="446" text-anchor="middle" fill="#4b5563">transparent decrypt · decompress · serve · repack writes to PAZ</text>
  <text x="350" y="462" text-anchor="middle" font-size="11" fill="#6b7280">auto-repack on file close · TUI with pending-write log</text>

  <line x1="350" y1="472" x2="350" y2="488" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── cdcore ───────────────────────────────────────────────────────── -->
  <rect x="20" y="491" width="660" height="42" rx="6"
        fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="350" y="510" text-anchor="middle" font-weight="600" font-size="13" fill="#713f12">cdcore</text>
  <text x="350" y="526" text-anchor="middle" fill="#4b5563">VFS · ChaCha20 · LZ4 · mesh · audio (WEM↔OGG) · DDS · CRC · LRU cache</text>

</svg>
