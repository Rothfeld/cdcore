name: Release

# Trigger on any version tag push (e.g. git tag v1.24.0 && git push --tags)
on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # Build cdcore Python wheels for each platform/arch combination.
  # maturin-action handles toolchain setup, cross-compilation, and manylinux Docker.
  wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Patch Cargo.toml version to match the git tag before maturin reads it.
      # maturin build has no --version flag; the version must be in Cargo.toml.
      # shell: bash works on all platforms via Git Bash on Windows.
      - shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading v  (v0.1.7 -> 0.1.7)
          VERSION="${VERSION#.}"            # strip leading dot if present (v.0.1.7 -> 0.1.7)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" cdcore/Cargo.toml cdcore/pyproject.toml

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # --out dist    write .whl files here
          # -F python,... enable the pyo3 python feature and extension-module
          #               (links against Python ABI, required for .pyd/.so output)
          args: --release --out dist -F python,extension-module
          working-directory: cdcore
          # auto  builds inside a manylinux Docker container on Linux so the
          # resulting wheel runs on any Linux distro, not just the runner's
          # glibc version.  No effect on Windows/macOS.
          manylinux: auto
          # The manylinux container has Python at /opt/python/cpXXX-cpXXX/bin/
          # but no bare 'python3' in PATH. Add a known version so maturin can
          # find an interpreter to package the Python source files.
          before-script-linux: |
            export PATH="/opt/python/cp312-cp312/bin:$PATH"

      - uses: actions/upload-artifact@v4.6.2
        with:
          # Unique name per matrix cell so artifacts don't overwrite each other
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: cdcore/dist/*.whl

  # Build the cdfuse binary for Linux (FUSE) and Windows (WinFsp).
  cdfuse-binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cdfuse-linux-x86_64
            paths: cdfuse/target/release/cdfuse
          - os: windows-latest
            artifact: cdwinfs-windows-x86_64
            paths: |
              cdwinfs.zip
              cdwinfs.zip.sha256
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Patch Cargo.toml versions from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" cdwinfs/Cargo.toml cdfuse/Cargo.toml

      - name: Install libfuse3 (Linux only; required by the fuser crate)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse3-dev

      # winfsp-sys no longer uses the 'system' feature, so it uses its own bundled
      # headers and import library at build time — no WinFSP installation needed on
      # the runner.  The binary finds winfsp-x64.dll at runtime via a reg query in
      # add_winfsp_bin_to_path() (main.rs).
      #
      # clang-sys (pulled in by winfsp-sys for bindgen) still needs libclang.
      - name: Set LIBCLANG_PATH (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $clang = Get-Command clang -ErrorAction SilentlyContinue
          $llvm  = if ($clang) { Split-Path $clang.Source } else { 'C:\Program Files\LLVM\bin' }
          "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: cargo build --release
        working-directory: ${{ runner.os == 'Windows' && 'cdwinfs' || 'cdfuse' }}

      # Bundle the .exe with LICENSE + README + third-party notices into a zip.
      # Distributing a labelled archive instead of a bare binary helps with
      # automated AV/Nexus heuristics and gives users a SHA-256 to verify.
      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item cdwinfs/target/release/cdwinfs.exe $stage/
          Copy-Item cdwinfs/LICENSE                    $stage/
          Copy-Item cdwinfs/README.md                  $stage/
          Copy-Item cdwinfs/THIRD_PARTY_LICENSES.md    $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath cdwinfs.zip -CompressionLevel Optimal
          $hash = (Get-FileHash cdwinfs.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  cdwinfs.zip" | Out-File cdwinfs.zip.sha256 -Encoding ascii

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}

  # Collect all artifacts from the jobs above and attach them to the GitHub Release
  # created automatically when the tag was pushed.
  github-release:
    needs: [wheels, cdfuse-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload release assets
      id-token: write       # mint OIDC token for Sigstore
      attestations: write   # publish build provenance attestation
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts   # downloads all artifacts into artifacts/<name>/

      # SLSA build provenance — verifiable proof that these exact files were
      # produced by this exact commit on GitHub Actions. Users (and Nexus
      # reviewers) can run `gh attestation verify <file> --owner <org>` to
      # confirm. Skips sidecars (.sha256) — only the real artifacts.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/wheels-*/*.whl
            artifacts/cdfuse-linux-x86_64/cdfuse
            artifacts/cdwinfs-windows-x86_64/cdwinfs.zip

      - uses: softprops/action-gh-release@v2
        with:
          # License compliance is satisfied by the --licenses flag embedded in each
          # binary (include_str! of THIRD_PARTY_LICENSES.md at build time).
          files: artifacts/**/*

      # VirusTotal pre-scan. Inert until repo secret VT_API_KEY is set
      # (free key from virustotal.com → Profile → API Key). Appends scan URLs
      # to the release body so reviewers (and Nexus) can verify cleanliness.
      #
      # Custom curl flow because crazy-max/ghaction-virustotal errors out on
      # HTTP 409 when the file is already in VT's database (open issue #220).
      # We GET /files/{sha256} first; on 404 fall back to upload.
      - name: VirusTotal scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          TAG:        ${{ github.ref_name }}
        if: env.VT_API_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          files=(
            "artifacts/cdwinfs-windows-x86_64/cdwinfs.zip"
            "artifacts/cdfuse-linux-x86_64/cdfuse"
          )
          links=""
          for f in "${files[@]}"; do
            [ -f "$f" ] || { echo "skip missing $f"; continue; }
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            name=$(basename "$f")
            status=$(curl -sS -o /tmp/vt.json -w '%{http_code}' \
              -H "x-apikey: $VT_API_KEY" \
              "https://www.virustotal.com/api/v3/files/$sha")
            if [ "$status" = "404" ]; then
              echo "uploading $name (not yet in VT)"
              curl -sS -H "x-apikey: $VT_API_KEY" \
                -F "file=@$f" \
                "https://www.virustotal.com/api/v3/files" >/dev/null
            elif [ "$status" != "200" ]; then
              echo "VT API $status for $name"; cat /tmp/vt.json; exit 1
            fi
            links+="- [\`$name\`](https://www.virustotal.com/gui/file/$sha) — \`$sha\`"$'\n'
          done
          body=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body)
          printf '%s\n\n## VirusTotal scans\n\n%s' "$body" "$links" \
            | gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" -F -
