name: Release

on:
  push:
    tags: ["v*"]

jobs:
  wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -F python,extension-module
          working-directory: crimsonforge_core
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crimsonforge_core/dist/*.whl

  cdfuse-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: cargo build --release
        working-directory: cdfuse

      - uses: actions/upload-artifact@v4
        with:
          name: cdfuse-linux-x86_64
          path: cdfuse/target/release/cdfuse

  github-release:
    needs: [wheels, cdfuse-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
